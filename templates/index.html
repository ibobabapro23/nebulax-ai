<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebulaX AI - Hasan Günbeyi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151921;
            --accent: #7000ff;
            --nebula-green: #00ff96;
            --danger: #ff4b4b;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(112, 0, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 25px rgba(112, 0, 255, 0.6)); }
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 150, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 150, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 150, 0); }
        }

        body {
            background-color: var(--bg-color);
            color: #e1e1e1;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px 10%;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        #welcome-area {
            margin: auto;
            text-align: center;
            animation: fadeInUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #welcome-area h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 12px;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            animation: glow 3s infinite;
        }

        #welcome-area p {
            font-size: 14px;
            color: var(--nebula-green);
            letter-spacing: 4px;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 600;
            opacity: 0.8;
        }

        .top-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
            animation: fadeInUp 1s ease-out;
        }

        .input-wrapper {
            width: 90%;
            max-width: 850px;
            margin: 0 auto 20px auto;
            background: var(--card-bg);
            border: 1px solid #3e444d;
            border-radius: 20px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: fadeInUp 1.2s ease-out;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
            padding: 10px;
        }

        .btn-nebula {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #3e444d;
            color: #8b949e;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            flex-shrink: 0;
        }

        .btn-nebula:hover {
            background: rgba(112, 0, 255, 0.2);
            color: white;
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .mic-active {
            color: var(--nebula-green) !important;
            border-color: var(--nebula-green) !important;
            animation: pulse-green 1.5s infinite;
        }

        .btn-send { background: var(--accent); color: white; border: none; }
        .btn-send:hover { background: #8214ff; box-shadow: 0 0 15px rgba(112, 0, 255, 0.4); }

        .msg-container { margin-bottom: 22px; display: flex; flex-direction: column; animation: fadeInUp 0.5s ease forwards; }
        .msg { max-width: 80%; padding: 14px 22px; border-radius: 20px; font-size: 15px; line-height: 1.6; }
        .user-msg { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: var(--card-bg); border: 1px solid #2d333b; align-self: flex-start; border-bottom-left-radius: 4px; }

        .footer-credit {
            text-align: center;
            padding-bottom: 15px;
            font-size: 11px;
            color: #484f58;
            letter-spacing: 1px;
        }
        .footer-credit b { color: var(--nebula-green); }

        @media (max-width: 768px) {
            #chat-window { padding: 20px 5%; }
            .input-wrapper { width: 95%; }
            #welcome-area h1 { font-size: 2.8rem; letter-spacing: 6px; }
        }
    </style>
</head>
<body>

    <div id="chat-window">
        <div id="welcome-area">
            <h1>NEBULAX</h1>
            <p>Robotik Kodlama Kulübü</p>
        </div>
    </div>

    <div class="top-controls">
        <button class="btn-nebula" style="width: auto; padding: 0 15px; font-size: 12px;" onclick="location.reload()">
            <i class="fas fa-plus me-2"></i> Yeni Sohbet
        </button>
        <button class="btn-nebula" style="width: auto; padding: 0 15px; font-size: 12px;" onclick="clearChat()">
            <i class="fas fa-trash-alt me-2"></i> Temizle
        </button>
    </div>

    <div class="input-wrapper">
        <label for="file-upload" class="btn-nebula" id="file-label">
            <i class="fas fa-paperclip"></i>
        </label>
        <input type="file" id="file-upload" hidden onchange="handleFileSelect()">
        
        <input type="text" id="user-input" placeholder="Bir mesaj yazın veya konuşun..." autocomplete="off">
        
        <button class="btn-nebula" id="mic-btn" onclick="toggleVoice()">
            <i class="fas fa-microphone"></i>
        </button>

        <button class="btn-nebula btn-send" onclick="send()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <div class="footer-credit">
        Yapımcı: <b>Hasan Günbeyi</b> | © 2026 NebulaX Projesi
    </div>

    <script>
        // --- SESLİ YAZMA (STT) ---
        const micBtn = document.getElementById('mic-btn');
        const userInput = document.getElementById('user-input');
        let isListening = false;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = false;

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('mic-active');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                send(); 
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('mic-active');
            };

            window.toggleVoice = () => {
                if (isListening) recognition.stop();
                else recognition.start();
            };
        } else {
            micBtn.style.display = 'none';
        }

        // --- DİĞER FONKSİYONLAR ---
        function handleFileSelect() {
            const fileLabel = document.getElementById('file-label');
            fileLabel.style.color = "var(--nebula-green)";
            fileLabel.style.borderColor = "var(--nebula-green)";
        }

        function clearChat() {
            document.getElementById('chat-window').innerHTML = `
                <div id="welcome-area">
                    <h1>NEBULAX</h1>
                    <p>Robotik Kodlama Kulübü</p>
                </div>
            `;
        }

        function appendMessage(role, text) {
            const welcome = document.getElementById('welcome-area');
            if (welcome) welcome.style.display = 'none';

            const div = document.createElement('div');
            div.className = 'msg-container';
            div.innerHTML = `<div class="msg ${role === 'user' ? 'user-msg' : 'ai-msg'}">${text}</div>`;
            document.getElementById('chat-window').appendChild(div);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }

        async function send() {
            const fileInput = document.getElementById('file-upload');
            const text = userInput.value.trim();
            const file = fileInput.files[0];

            if (!text && !file) return;

            let msg = text;
            if (file) msg += `<br><small style="opacity:0.7">📂 ${file.name}</small>`;
            appendMessage('user', msg);
            userInput.value = '';

            const formData = new FormData();
            formData.append('message', text);
            if (file) formData.append('file', file);

            try {
                const res = await fetch('/ask', { method: 'POST', body: formData });
                const data = await res.json();
                appendMessage('ai', data.response);
            } catch (e) {
                appendMessage('ai', "Bağlantı hatası.");
            }

            fileInput.value = '';
            document.getElementById('file-label').style.color = "#8b949e";
            document.getElementById('file-label').style.borderColor = "#3e444d";
        }

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>
