<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebulaX AI - Hasan Günbeyi</title>
    <link href="https://cdn.npmmirror.com/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151921;
            --sidebar-bg: #0d1117;
            --accent: #7000ff;
            --nebula-green: #00ff96;
            --soft-gray: #8b949e;
        }

        /* --- ANİMASYONLAR --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(112, 0, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 30px rgba(112, 0, 255, 0.6)); }
        }

        body {
            background-color: var(--bg-color);
            color: #e1e1e1;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #2d333b;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .sidebar.closed {
            width: 0;
            padding: 0;
            margin-left: -280px;
            visibility: hidden;
        }

        .toggle-menu-btn {
            position: fixed;
            left: 20px;
            top: 20px;
            z-index: 1000;
            background: var(--card-bg);
            border: 1px solid #3e444d;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .toggle-menu-btn:hover { background: var(--accent); }

        .new-chat-btn {
            background: rgba(112, 0, 255, 0.1);
            border: 1px solid var(--accent);
            color: white;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            margin-top: 50px;
            margin-bottom: 20px;
            transition: 0.3s;
            animation: fadeInUp 0.8s ease-out;
        }

        .chat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            transition: 0.2s;
        }

        .chat-name-input {
            background: transparent;
            border: none;
            color: var(--soft-gray);
            font-size: 14px;
            outline: none;
            width: 65%;
            pointer-events: none;
        }
        .chat-name-input.editing {
            color: white;
            border-bottom: 1px solid var(--nebula-green);
            pointer-events: auto;
        }

        .item-icons { opacity: 0; display: flex; gap: 10px; transition: 0.2s; cursor: pointer; }
        .chat-item:hover .item-icons { opacity: 1; }
        .item-icons i:hover { color: var(--nebula-green); }

        /* --- ANA ALAN (MERKEZLEME BURADA) --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center; /* Yatayda merkezle */
            justify-content: center; /* Dikeyde merkezle */
            position: relative;
            transition: all 0.4s ease; /* Menü kapandığında pürüzsüz kayma */
        }

        #welcome-area {
            text-align: center;
            animation: fadeInUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #welcome-area h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: 15px;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 3s infinite;
        }

        /* MESAJLAR VARKEN ÜSTTEN BAŞLAMASI İÇİN */
        #chat-window {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            padding: 40px 15%;
            display: none; /* Mesaj gelince flex olacak */
        }

        /* --- GİRİŞ ALANI --- */
        .input-area-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 25px;
            margin-top: 20px;
        }

        .input-wrapper {
            width: 85%;
            max-width: 850px;
            background: var(--card-bg);
            border: 1px solid #3e444d;
            border-radius: 25px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            animation: fadeInUp 1.2s ease-out;
        }

        input[type="text"] { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }

        .soft-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #3e444d;
            color: var(--soft-gray);
            width: 45px;
            height: 45px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .soft-btn:hover { background: rgba(112, 0, 255, 0.2); color: white; transform: translateY(-3px); }
        .mic-active { color: var(--nebula-green) !important; border-color: var(--nebula-green) !important; animation: glow 1.5s infinite; }
        .btn-send { background: var(--accent); color: white; border: none; }

        .msg-bubble { margin-bottom: 20px; animation: fadeInUp 0.4s ease forwards; max-width: 80%; padding: 14px 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <button class="toggle-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <div class="sidebar" id="sidebar">
        <div class="new-chat-btn" onclick="createNewChat()">+ Yeni Sohbet</div>
        <div id="chat-list"></div>
    </div>

    <div class="main-content" id="main-area">
        <div id="welcome-area">
            <h1>NEBULAX</h1>
            <p style="color: var(--nebula-green); letter-spacing: 5px; font-weight: bold; opacity: 0.8;">ROBOTİK KODLAMA KULÜBÜ</p>
        </div>

        <div id="chat-window"></div>

        <div class="input-area-container">
            <div class="input-wrapper">
                <label for="file-upload" class="soft-btn" id="file-label">
                    <i class="fas fa-paperclip"></i>
                </label>
                <input type="file" id="file-upload" hidden onchange="updateFileStatus()">
                
                <input type="text" id="userInput" placeholder="Mesaj yazın veya konuşun..." autocomplete="off">
                
                <button class="soft-btn" id="mic-btn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
                <button class="soft-btn btn-send" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <div style="font-size: 11px; color: #484f58; margin-bottom: 10px;">Yapımcı: Hasan Günbeyi | © 2026</div>
    </div>

    <script>
        // --- MENÜ VE ORTALAMA MANTIĞI ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
        }

        function updateFileStatus() {
            const file = document.getElementById('file-upload').files[0];
            const label = document.getElementById('file-label');
            if(file) {
                label.style.color = "var(--nebula-green)";
                label.style.borderColor = "var(--nebula-green)";
            }
        }

        function createNewChat() {
            const id = Date.now();
            const item = document.createElement('div');
            item.className = 'chat-item';
            item.innerHTML = `
                <input type="text" class="chat-name-input" id="name-${id}" value="Yeni Sohbet" readonly>
                <div class="item-icons">
                    <i class="fas fa-pen" onclick="enableEdit('${id}')"></i>
                    <i class="fas fa-trash" onclick="this.parentElement.parentElement.remove()"></i>
                </div>`;
            document.getElementById('chat-list').prepend(item);
            
            // Ekranı sıfırla ve Merkeze Al
            document.getElementById('chat-window').style.display = 'none';
            document.getElementById('welcome-area').style.display = 'block';
            document.getElementById('main-area').style.justifyContent = 'center';
        }

        function enableEdit(id) {
            const input = document.getElementById('name-' + id);
            input.classList.add('editing'); input.readOnly = false; input.focus();
            input.onblur = () => { input.readOnly = true; input.classList.remove('editing'); };
            input.onkeypress = (e) => { if(e.key === 'Enter') input.blur(); };
        }

        // --- SESLİ YAZMA ---
        const micBtn = document.getElementById('mic-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const rec = new SpeechRecognition(); rec.lang = 'tr-TR';
            rec.onstart = () => micBtn.classList.add('mic-active');
            rec.onend = () => micBtn.classList.remove('mic-active');
            rec.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; handleSend(); };
            window.toggleVoice = () => rec.start();
        }

        // --- GÖNDERME VE DOSYA ---
        async function handleSend() {
            const input = document.getElementById('userInput');
            const fileInput = document.getElementById('file-upload');
            const text = input.value.trim();
            const file = fileInput.files[0];

            if (!text && !file) return;

            document.getElementById('welcome-area').style.display = 'none';
            document.getElementById('main-area').style.justifyContent = 'flex-start'; // Mesaj varken yukarıdan başla
            const win = document.getElementById('chat-window');
            win.style.display = 'block';

            let userMsg = text;
            if(file) userMsg += `<br><small style="color:var(--nebula-green)">📂 ${file.name}</small>`;
            
            win.innerHTML += `<div style="display:flex; justify-content:flex-end;"><div class="msg-bubble" style="background:var(--accent);">${userMsg}</div></div>`;
            
            const formData = new FormData();
            formData.append('message', text);
            if(file) formData.append('file', file);

            input.value = '';
            fileInput.value = '';
            document.getElementById('file-label').style.color = "var(--soft-gray)";
            win.scrollTop = win.scrollHeight;

            try {
                const res = await fetch('/ask', { method: 'POST', body: formData });
                const data = await res.json();
                win.innerHTML += `<div style="display:flex; justify-content:flex-start;"><div class="msg-bubble" style="background:var(--card-bg); border:1px solid #333;">${data.response}</div></div>`;
                win.scrollTop = win.scrollHeight;
            } catch (e) { console.error("Hata"); }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
