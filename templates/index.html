<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebulaX AI - Hasan Günbeyi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --chat-bg: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: var(--chat-bg); border: 1px solid #334155; border-bottom-left-radius: 2px; }
        
        #input-area { background: var(--chat-bg); padding: 20px; display: flex; gap: 10px; border-top: 1px solid #334155; align-items: center; }
        input[type="text"] { flex: 1; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        #file-label { cursor: pointer; color: var(--accent); padding: 5px; }
        .loading { font-style: italic; color: #94a3b8; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="message ai-msg">Merhaba! Ben NebulaX AI. Hasan Günbeyi tarafından geliştirildim. Size nasıl yardımcı olabilirim?</div>
</div>

<form id="chat-form">
    <div id="input-area">
        <label id="file-label">
            <i class="fas fa-paperclip fa-lg"></i>
            <input type="file" id="file-input" name="file" hidden>
        </label>
        <input type="text" id="user-input" name="message" placeholder="Mesajınızı yazın..." autocomplete="off">
        <button type="submit" id="send-btn">Gönder</button>
    </div>
</form>

<script>
    const form = document.getElementById('chat-form');
    const container = document.getElementById('chat-container');

    form.onsubmit = async (e) => {
        e.preventDefault();
        const input = document.getElementById('user-input');
        const fileInput = document.getElementById('file-input');
        
        if(!input.value && !fileInput.files[0]) return;

        // Kullanıcı mesajını ekrana yaz
        const userText = input.value || (fileInput.files[0] ? "[Dosya gönderildi]" : "");
        appendMessage('user-msg', userText);
        
        // Bekleme göstergesi
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai-msg loading';
        loadingDiv.innerText = 'NebulaX düşünüyor...';
        container.appendChild(loadingDiv);
        
        const formData = new FormData(form);
        input.value = '';
        fileInput.value = '';

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            container.removeChild(loadingDiv);

            // KRİTİK NOKTA: data.response Python'daki {'response': ...} ile eşleşir
            if (data.response) {
                appendMessage('ai-msg', data.response);
            } else if (data.error) {
                appendMessage('ai-msg', "Hata: " + data.error);
            }
        } catch (error) {
            container.removeChild(loadingDiv);
            appendMessage('ai-msg', "Bağlantı hatası oluştu.");
        }
    };

    function appendMessage(className, text) {
        const div = document.createElement('div');
        div.className = `message ${className}`;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
